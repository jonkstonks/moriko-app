name: Deploy Moriko App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Deploy
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        script: |
          set -euo pipefail
          cd /home/ubuntu/moriko-app
          git fetch --prune origin main
          git checkout -f main
          git reset --hard origin/main

          sudo cp -r /home/ubuntu/moriko-app/Main/. /var/www/html/
          sudo cp -r /home/ubuntu/moriko-app/node-modules/. /var/www/html
          sudo cp /home/ubuntu/moriko-app/package-lock.json /var/www/html
          sudo cp /home/ubuntu/moriko-app/package.json /var/www/html
          

          sudo systemctl reload nginx
          echo "Deployment completed on $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
