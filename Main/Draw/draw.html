<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>M O R I K O ฅ^•ﻌ•^ฅ</title>
  <link rel="stylesheet" href="draw.css"/>
</head>
<body>

  <!-- ─── Tablet shell ─── -->
  <div class="tablet">

    <!-- Top bar: camera · logo · status -->
    <div class="tablet-topbar">
      <div class="tablet-cam"></div>
      <div class="tablet-logo"> MORIKO <span>APP </span></div>
    </div>

    <!-- Screen bezel -->
    <div class="screen-bezel">
      <div class="screen">

        <!-- ─── Sidebar ─── -->
        <aside class="sidebar">

          <!-- Tools -->
          <div>
            <div class="sec-label">Tool</div>
            <div class="tool-grid">
              <button class="tool-btn active" id="toolPen"    data-tool="pen">&#9999; PEN</button>
              <button class="tool-btn"        id="toolFill"   data-tool="fill">&#129531; FILL</button>
              <button class="tool-btn"        id="toolRect"   data-tool="rect">&#9645; RECT</button>
              <button class="tool-btn"        id="toolLine"   data-tool="line">&#9585; LINE</button>
              <button class="tool-btn"        id="toolEraser" data-tool="eraser">&#9633; ERASE</button>
              <button class="tool-btn"        id="toolPick"   data-tool="pick">&#128137; PICK</button>
            </div>
          </div>

          <!-- Canvas size -->
          <div>
            <div class="sec-label">Canvas Size</div>
            <div class="size-list" id="sizeList"></div>
          </div>

          <!-- Zoom -->
          <div>
            <div class="sec-label">Zoom</div>
            <div class="zoom-row">
              <button class="zoom-btn" id="zoomOut">&minus;</button>
              <span class="zoom-val" id="zoomVal">1&times;</span>
              <button class="zoom-btn" id="zoomIn">+</button>
              <button class="zoom-reset" id="zoomFit">FIT</button>
            </div>
          </div>

          <!-- Pen size -->
          <div id="penSizeSection">
            <div class="sec-label">Pen Size</div>
            <div class="px-row" id="pxRow"></div>
          </div>

          <!-- Color -->
          <div>
            <div class="sec-label">Color</div>
            <div class="cur-row">
              <div class="cur-box" id="curBox"></div>
              <div class="cur-hex" id="curHex">#F4A7C0</div>
            </div>
            <div class="palette" id="palette"></div>
            <div class="custom-row">
              <input type="color" id="customColor"/>
              custom
            </div>
          </div>

          <!-- Grid toggle -->
          <div>
            <div class="sec-label">Grid</div>
            <div class="toggle-row" id="gridTogRow">
              <div class="tog-box on" id="gridTog">&#10003;</div>
              <span>Show grid</span>
            </div>
          </div>

          <!-- Action buttons -->
          <div class="act-btns">
            <button class="act-btn save" id="btnSave">[ SAVE ]</button>
            <button class="act-btn"      id="btnDownload">[ DOWNLOAD ]</button>
            <button class="act-btn"      id="btnUndo">[ UNDO ]</button>
            <button class="act-btn"      id="btnClear">[ CLEAR ]</button>
            <a href="../Gallery/gallery.html" target="_blank" style="text-decoration:none;display:block;">
              <button class="act-btn gal">[ GALLERY &rarr; ]</button>
            </a>
          </div>

        </aside>

        <!-- ─── Main canvas area ─── -->
        <div class="main">

          <!-- Status bar -->
          <div class="canvas-topbar">
            <span id="modeLabel">pen</span>
            <span id="gridLabel">64&times;64</span>
            <div class="tablet-status">
            <span id="coordInfo">x:— y:—</span>
            <span id="zoomInfo">100%</span>
            </div>
            <span style="margin-left:auto;font-size:11px;color:var(--muted)">
              P&middot;F&middot;R&middot;L&middot;E&middot;K &nbsp;|&nbsp; Ctrl+Z &nbsp;|&nbsp; Ctrl+scroll = zoom
            </span>
          </div>

          <!-- Ruler + scrollable canvas viewport -->
          <div class="viewport-wrap" id="viewportWrap">
            <div class="ruler-corner"></div>
            <div class="ruler-x"><canvas id="rulerX"></canvas></div>
            <div class="ruler-y"><canvas id="rulerY"></canvas></div>
            <div class="canvas-viewport" id="canvasViewport">
              <div class="canvas-inner" id="canvasInner">
                <canvas id="pixelCanvas"></canvas>
              </div>
            </div>
          </div>

        </div><!-- /main -->

      </div><!-- /screen -->
    </div><!-- /screen-bezel -->

    <!-- Home bar -->
    <div class="tablet-homebar">
      <div class="home-dot"></div>
      <div class="home-btn"></div>
      <div class="home-dot"></div>
    </div>

  </div><!-- /tablet -->

  <!-- Resize confirmation modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-title">&#9888; RESIZE CANVAS</div>
      <div class="modal-body">This will clear your drawing. Continue?</div>
      <div class="modal-btns">
        <button class="modal-btn cancel"  id="btnCancelResize">CANCEL</button>
        <button class="modal-btn confirm" id="btnConfirmResize">CLEAR &amp; RESIZE</button>
      </div>
    </div>
  </div>
  <script type="module" src="draw.js?v=2"></script>
</body>
</html>
